# Unified GitHub Actions Workflow for Serverless Edge Deployment
name: Deploy KineSign Live Client to Pages

on:
  # Triggers the workflow automatically every time you push changes to the main branch
  push:
    branches: ["main"]

  # Allows you to manually trigger this workflow from the Actions tab if needed
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment to prevent pipeline overlapping collisions
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deployment job since we are hosting a static edge application
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Setup GitHub Pages Configuration
        uses: actions/configure-pages@v4

      - name: Package Web and ONNX Assets
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire root directory (contains index.html and your monolithic model binary)
          path: '.'

      - name: Deploy Compiled Infrastructure to Edge
        id: deployment
        uses: actions/deploy-pages@v4
