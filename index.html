<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KineSign AI — Continuous Transcription</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.min.js" crossorigin="anonymous"></script>

    <style>
        body { background: #FAFAFA; color: #1A1A1A; font-family: 'Newsreader', serif; margin: 0; padding: 40px; }
        h1 { font-weight: 500; font-size: 32px; border-bottom: 1px solid #E5E5E5; padding-bottom: 15px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 1200px; margin: auto; }
        
        .panel { 
            background: #FFFFFF; padding: 24px; border-radius: 12px; border: 1px solid #E5E5E5; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); display: flex; flex-direction: column;
        }
        
        .video-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000000; border-radius: 8px; overflow: hidden; margin-bottom: 15px;}
        video { display: none; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        .transcript-box {
            font-family: 'Newsreader', serif; font-size: 28px; color: #1A1A1A; background: #FFFFFF;
            min-height: 150px; margin-top: 15px; padding: 20px; border-radius: 8px; border: 1px solid #D95319;
            line-height: 1.5; word-wrap: break-word;
        }
        
        #status { font-weight: 600; color: #D95319; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px;}
        
        .controls { display: flex; gap: 15px; margin-bottom: 20px; }
        button { font-family: 'Newsreader', serif; font-size: 16px; padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none; transition: 0.2s; font-weight: 500; }
        .btn-primary { background: #D95319; color: white; }
        .btn-primary:hover { background: #C04612; }
        .btn-stop { background: #FFFFFF; border: 1px solid #D95319; color: #D95319; }
        .btn-stop:hover { background: #FFF5F0; }
        .btn-stop:disabled { border-color: #E5E5E5; color: #A0A0A0; background: #FAFAFA; cursor: not-allowed; }

        details { margin-top: 15px; border-top: 1px solid #E5E5E5; padding-top: 15px; font-size: 15px; color: #666; }
        summary { cursor: pointer; font-weight: 500; color: #D95319; outline: none; margin-bottom: 10px;}
        .interpret-view { font-size: 13px; font-family: monospace; }
        
        .pulse { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div style="max-width: 1200px; margin: auto;">
    <h1>KineSign Live Thread</h1>
    <div class="grid">
        <div class="panel">
            <div id="status">Booting Neural Network...</div>
            <div class="video-wrapper">
                <video id="webcam" playsinline muted autoplay></video>
                <canvas id="skeletal-overlay"></canvas>
            </div>
            
            <details>
                <summary>Interpretability: Joint Activation Map (Pseudo-GradCAM)</summary>
                <div class="interpret-view">
                    <p>Colors map coordinate velocity variance & model attention intensity over active frames.</p>
                    <div id="heatmap-data">Activation: Awaiting input...</div>
                </div>
            </details>
        </div>

        <div class="panel">
            <div class="controls">
                <button id="startBtn" class="btn-primary">Start Thread</button>
                <button id="stopBtn" class="btn-stop" disabled>Stop Thread</button>
            </div>
            <div style="font-size: 14px; color: #666;">Rolling Transcription Output (4-Sec Buffer):</div>
            <div class="transcript-box" id="output">...</div>
        </div>
    </div>
</div>

<script>
    const CHAR_MAP = "-abcdefghijklmnopqrstuvwxyz ";
    const TOTAL_FRAMES = 120, FEATURE_DIM = 225;
    
    let ortSession = null;
    let buffer = new Float32Array(TOTAL_FRAMES * FEATURE_DIM);
    
    let isRecording = false;
    let fullTranscript = "";
    
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('skeletal-overlay');
    const ctx = canvas.getContext('2d');
    const outputBox = document.getElementById('output');
    const heatmapView = document.getElementById('heatmap-data');

    document.getElementById('startBtn').addEventListener('click', () => {
        isRecording = true;
        fullTranscript = "";
        outputBox.innerHTML = '<span class="pulse">● Recording...</span>';
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('startBtn').style.background = "#E5E5E5";
        document.getElementById('startBtn').style.color = "#A0A0A0";
    });

    document.getElementById('stopBtn').addEventListener('click', () => {
        isRecording = false;
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        document.getElementById('startBtn').style.background = "#D95319";
        document.getElementById('startBtn').style.color = "white";
    });

    async function initONNX() {
        ort.env.wasm.wasmPaths = "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/";
        try {
            ortSession = await ort.InferenceSession.create('kinesign_monolith.onnx');
            document.getElementById('status').innerText = "Edge Engine Online";
            document.getElementById('status').style.color = "#22C55E";
        } catch (e) {
            document.getElementById('status').innerText = `Model Load Failed: ${e.message}`;
            document.getElementById('status').style.color = "#EF4444"; 
            console.error("ONNX Error:", e);
        }
    }

    function onResults(results) {
        if (!video.videoWidth || video.videoWidth === 0) return;

        if (canvas.width !== video.videoWidth) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        }
        
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (results.image) {
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        }
        
        let frameSlice = new Float32Array(FEATURE_DIM);
        let maxActivation = 0;
        let handDetected = false;

        if (results.multiHandLandmarks && results.multiHandedness && results.multiHandLandmarks.length > 0) {
            handDetected = true;
            for (let h = 0; h < results.multiHandLandmarks.length; h++) {
                let landmarks = results.multiHandLandmarks[h];
                
                let wrist_x = landmarks[0].x;
                let wrist_y = landmarks[0].y;
                let wrist_z = landmarks[0].z;
                
                for (let i = 0; i < 21; i++) {
                    let nx = landmarks[i].x - wrist_x;
                    let ny = landmarks[i].y - wrist_y;
                    let nz = landmarks[i].z - wrist_z;
                    
                    // Duplicate normalized points into both Left and Right slots to bypass mirroring issues
                    let leftBase = i * 3;
                    let rightBase = 63 + (i * 3);
                    
                    frameSlice[leftBase] = nx;
                    frameSlice[leftBase + 1] = ny;
                    frameSlice[leftBase + 2] = nz;
                    
                    frameSlice[rightBase] = nx;
                    frameSlice[rightBase + 1] = ny;
                    frameSlice[rightBase + 2] = nz;
                    
                    let activation = Math.abs(landmarks[i].x - 0.5) + Math.abs(landmarks[i].y - 0.5);
                    if(activation > maxActivation) maxActivation = activation;

                    let heatColor = `rgba(217, 83, 25, ${Math.min(1.0, activation * 1.5)})`;
                    ctx.fillStyle = heatColor;
                    ctx.beginPath();
                    ctx.arc(landmarks[i].x * canvas.width, landmarks[i].y * canvas.height, 6, 0, 2 * Math.PI);
                    ctx.fill();
                }
            }
        }
        
        ctx.restore();
        heatmapView.innerText = `Max Frame Activation Heat: ${maxActivation.toFixed(3)}`;

        buffer.set(buffer.subarray(FEATURE_DIM), 0);
        buffer.set(frameSlice, (TOTAL_FRAMES - 1) * FEATURE_DIM);

        if (ortSession && isRecording && handDetected) {
            runInference();
        }
    }

    async function runInference() {
        try {
            const inputTensor = new ort.Tensor('float32', buffer, [1, 120, 225]);
            const outputMap = await ortSession.run({ input_coordinates: inputTensor });
            const logits = outputMap.transcription_logits.data;
            
            let currentSequence = "";
            let previousClassIdx = 0; 
            
            for(let f = 0; f < TOTAL_FRAMES; f++) {
                let frameOffset = f * 28;
                let argmaxIdx = 0;
                let maxLogit = -Infinity;

                logits[frameOffset + 0] -= 2.5;
                
                for(let c = 0; c < 28; c++) {
                    if(logits[frameOffset + c] > maxLogit) {
                        maxLogit = logits[frameOffset + c];
                        argmaxIdx = c;
                    }
                }
                
                if (argmaxIdx !== 0 && argmaxIdx !== previousClassIdx) {
                    currentSequence += CHAR_MAP[argmaxIdx];
                }
                previousClassIdx = argmaxIdx;
            }
            
            if (currentSequence.trim().length > 0) {
                outputBox.innerText = currentSequence.toUpperCase();
            }

        } catch (err) { console.error(err); }
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    hands.onResults(onResults);
    
    async function startCameraStream() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 360 } });
            video.srcObject = stream;
            video.onloadeddata = () => {
                video.play();
                processFrame();
            };
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerText = "Webcam Access Denied";
        }
    }

    async function processFrame() {
        if (video.readyState >= 2) {
            await hands.send({ image: video });
        }
        requestAnimationFrame(processFrame);
    }

    initONNX().then(() => { startCameraStream(); });
</script>
</body>
</html>
