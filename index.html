<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KineSign AI — Infinite Open-Vocabulary Transduction Client</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0B0F19; color: #F8FAFC; font-family: sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; margin: auto; }
        .panel { background: #151D30; padding: 20px; border-radius: 12px; border: 1px solid #23314E; }
        video { display: none; }
        canvas { width: 100%; border-radius: 8px; background: #000; }
        .text-stream { font-size: 42px; font-weight: bold; color: #34D399; font-family: monospace; min-height: 60px; margin-top: 10px; background: #0B0F19; padding: 15px; border-radius: 8px; border: 1px solid #23314E; letter-spacing: 1px; }
        #status { font-weight: bold; color: #38BDF8; margin-bottom: 5px; }
    </style>
</head>
<body>
<div class="grid">
    <div class="panel">
        <video id="webcam" playsinline muted></video>
        <canvas id="skeletal-overlay"></canvas>
    </div>
    <div class="panel">
        <div id="status">Booting Neural Network Engine...</div>
        <div style="font-size: 14px; color: #94A3B8;">Decoded Text via Greedy CTC Search (Infinite Open Lexicon):</div>
        <div class="text-stream" id="output">Initializing Video Tracks...</div>
        <div style="margin-top:20px; height:180px;"><canvas id="chart"></canvas></div>
    </div>
</div>

<script>
    const CHAR_MAP = "-abcdefghijklmnopqrstuvwxyz ";
    const TOTAL_FRAMES = 120, FEATURE_DIM = 225;
    let ortSession = null;
    let buffer = new Float32Array(TOTAL_FRAMES * FEATURE_DIM);
    
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('skeletal-overlay');
    const ctx = canvas.getContext('2d');

    let chartInstance = new Chart(document.getElementById('chart').getContext('2d'), {
        type: 'bar',
        data: {
            labels: Array.from(CHAR_MAP),
            datasets: [{ data: Array(28).fill(0), backgroundColor: '#38BDF8', barPercentage: 0.75 }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { min: -5, max: 5, grid: { color: '#23314E' }, ticks: { color: '#94A3B8' } },
                x: { grid: { display: false }, ticks: { color: '#94A3B8' } }
            }
        }
    });

    async function initONNX() {
        ort.env.wasm.numThreads = 1;
        ort.env.wasm.proxy = false;
        ort.env.wasm.wasmPaths = "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/";
        try {
            ortSession = await ort.InferenceSession.create('./kinesign_transformer.onnx');
            document.getElementById('status').innerText = "Conv-Transformer Edge Transduction Session Built";
            document.getElementById('output').innerText = "Listening for gestures...";
        } catch (e) {
            document.getElementById('status').innerText = "Compilation Failure Error";
            document.getElementById('output').style.color = "#EF4444";
            document.getElementById('output').innerText = "ONNX Crash: " + e.message;
        }
    }

    function onResults(results) {
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 360;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        
        let frameSlice = new Float32Array(FEATURE_DIM);

        function extractJoints(landmarks, offset, count, isHand) {
            for (let i = 0; i < count; i++) {
                let base = offset + (i * 3);
                if (landmarks && landmarks[i]) {
                    frameSlice[base] = landmarks[i].x;
                    frameSlice[base + 1] = landmarks[i].y;
                    frameSlice[base + 2] = landmarks[i].z;
                    ctx.fillStyle = isHand ? '#34D399' : '#38BDF8';
                    ctx.beginPath(); ctx.arc(landmarks[i].x * canvas.width, landmarks[i].y * canvas.height, 4, 0, 2 * Math.PI); ctx.fill();
                }
            }
        }

        extractJoints(results.leftHandLandmarks, 0, 21, true);
        extractJoints(results.rightHandLandmarks, 63, 21, true);
        extractJoints(results.poseLandmarks, 126, 33, false);
        
        // Push current frame data into the rolling history window
        buffer.set(buffer.subarray(FEATURE_DIM), 0);
        buffer.set(frameSlice, (TOTAL_FRAMES - 1) * FEATURE_DIM);

        if (ortSession) {
            runInference();
        }
        ctx.restore();
    }

    async function runInference() {
        try {
            // FIXED SHAPE PACKING: Create explicit copy to prevent float-corruption drops
            const inferenceInputBuffer = new Float32Array(buffer);
            const inputTensor = new ort.Tensor('float32', inferenceInputBuffer, [1, 120, 225]);
            
            const feeds = { input_coordinates: inputTensor };
            const outputMap = await ortSession.run(feeds);
            const logits = outputMap.transcription_logits.data;
            
            // GREEDY CTC DECODER STRIP
            let transcribedString = "", precedingTokenIdx = -1;
            for (let f = 0; f < TOTAL_FRAMES; f++) {
                let argmaxClassIdx = 0, peakValue = -Infinity;
                for(let c = 0; c < 28; c++) {
                    let cellValue = logits[f * 28 + c];
                    if(cellValue > peakValue) { peakValue = cellValue; argmaxClassIdx = c; }
                }
                if(argmaxClassIdx !== 0 && argmaxClassIdx !== precedingTokenIdx) {
                    transcribedString += CHAR_MAP[argmaxClassIdx];
                }
                precedingTokenIdx = argmaxClassIdx;
            }
            
            if (transcribedString.trim().length > 0) {
                document.getElementById('output').innerText = transcribedString.toUpperCase();
            } else {
                document.getElementById('output').innerText = "Listening for gestures...";
            }

            // Push character distribution configurations directly to chart canvas elements
            let frameOffset = (TOTAL_FRAMES - 1) * 28;
            let activeLogits = [];
            for(let i = 0; i < 28; i++) {
                activeLogits.push(logits[frameOffset + i]);
            }
            chartInstance.data.datasets[0].data = activeLogits;
            chartInstance.update('none');
        } catch (err) {
            console.error("[INFERENCE EXCEPTION]", err);
        }
    }

    const holistic = new Holistic({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${f}`});
    holistic.setOptions({ modelComplexity: 1, smoothLandmarks: true });
    holistic.onResults(onResults);
    
    new Camera(video, {onFrame: async () => await holistic.send({image: video}), width: 640, height: 360}).start();
    initONNX();
</script>
</body>
</html>
